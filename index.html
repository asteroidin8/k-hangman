  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "한글 행맨",
      "url": "https://asteroidin8.github.io/k-hangman/",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web",
      "description": "하루 한 단어. 한글 자모로 정답을 추리하는 행맨 게임",
      "inLanguage": "ko"
    }
  </script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"

</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand title-font">한글 행맨</div>

      <div class="toolbar" id="toolbar">
        <button class="icon-btn" id="helpBtn" type="button" aria-label="도움말">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9.1 9a3 3 0 1 1 5.3 2c-.8 1-1.9 1.5-2.4 2.4-.2.4-.3.7-.3 1.1"></path>
            <circle cx="12" cy="18" r="1"></circle>
          </svg>
        </button>

        <button class="icon-btn" id="hintBtn" type="button" aria-label="힌트">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 18h6"></path>
            <path d="M10 22h4"></path>
            <path d="M8 14c-1.2-.9-2-2.4-2-4a6 6 0 1 1 12 0c0 1.6-.8 3.1-2 4-.8.6-1 1.2-1 2H9c0-.8-.2-1.4-1-2Z"></path>
          </svg>
        </button>

        <button class="icon-btn" id="statsBtn" type="button" aria-label="통계">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 19V5"></path>
            <path d="M4 19h16"></path>
            <path d="M8 16v-5"></path>
            <path d="M12 16V8"></path>
            <path d="M16 16v-3"></path>
          </svg>
        </button>

        <button class="icon-btn" id="settingsBtn" type="button" aria-label="설정">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h.1a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="board" id="board">
      <div class="message hidden" id="message" role="status" aria-live="polite">
        <div class="message-text" id="messageText"></div>
      </div>

      <div class="word-meaning" id="wordMeaning" aria-live="polite">
        <div class="message-text" id="wordMeaningText"></div>
      </div>

      <div class="hangman-zone">
        <div id="gallowsMount" class="svg-mount gallows-mount" aria-hidden="true"></div>
        <div id="hangmanMount" class="svg-mount hangman-mount" aria-hidden="true"></div>
      </div>

      <div class="answer-row">
        <div class="answer-slots" id="answerSlots" aria-label="정답 슬롯"></div>
      </div>

      <div class="input-row">
        <div class="wrong-jamo-list" id="wrongJamoList" aria-label="틀린 자모"></div>
        <div class="jamo-keyboard" id="jamoKeyboard" aria-label="자모 키보드"></div>
      </div>
    </section>

    <section class="ad-strip" id="adStrip" aria-label="광고 영역">
      <div class="ad-mascot-area" id="adMascotArea">
        <div class="ad-sign is-hidden" id="adSign"></div>
        <div class="restman-wrap" id="restmanWrap" aria-hidden="true">
          <div id="restmanMount" class="restman-mount"></div>
        </div>
      </div>

      <div class="ad-slot" aria-label="광고 영역">
      </div>
    </section>

    <footer class="site-footer" aria-label="사이트 정보">
      <a href="contact.html">문의</a>
      <span aria-hidden="true">·</span>
      <a href="privacy.html">개인정보처리방침</a>
      <span aria-hidden="true">·</span>
      <a href="terms.html">이용약관</a>
    </footer>
  </main>

  <div class="modal-backdrop hidden" id="statsModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="closeModalBtn" type="button" aria-label="닫기">×</button>

      <div class="modal-title title-font" id="modalTitle">살았다</div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">생존</div>
          <div class="stat-value" id="aliveCount">0</div>
        </div>

        <div class="stat">
          <div class="stat-label">죽음</div>
          <div class="stat-value" id="deadCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">승률</div>
          <div class="stat-value" id="winRate">0%</div>
        </div>
        <div class="stat">
          <div class="stat-label">평균 시도</div>
          <div class="stat-value" id="averageAttempts">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">최고 기록</div>
          <div class="stat-value" id="bestAttempts">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">연속 생존</div>
          <div class="stat-value" id="currentStreak">0</div>
        </div>
      </div>

      <div class="how-to-play hidden" id="howToPlay">
        <svg class="help-example" viewBox="0 0 280 176" role="img" aria-label="행맨 보드 예시">
          <rect class="help-board" x="8" y="8" width="264" height="160" rx="18"></rect>
          <g class="help-lines" aria-hidden="true">
            <path d="M18 26h244"></path>
            <path d="M18 44h244"></path>
            <path d="M18 62h244"></path>
          </g>
          <text class="help-meaning" x="140" y="32">오늘의 단어</text>
          <g class="help-gallows" aria-hidden="true">
            <path d="M52 92h44"></path>
            <path d="M72 92V50h38"></path>
            <path d="M110 50v9"></path>
            <circle cx="110" cy="70" r="9"></circle>
            <path d="M110 79v17"></path>
            <path d="M110 86l-10 7"></path>
            <path d="M110 86l10 7"></path>
          </g>
          <g class="help-slots" aria-hidden="true">
            <path d="M145 93h24"></path>
            <path d="M177 93h24"></path>
            <path d="M209 93h24"></path>
            <text x="157" y="83">ㅎ</text>
            <text x="189" y="83">ㅏ</text>
          </g>
          <text class="help-wrong" x="140" y="112">ㄱ ㄴ ㅓ</text>
          <g class="help-keys" aria-hidden="true">
            <rect x="31" y="124" width="19" height="18" rx="4"></rect>
            <rect x="56" y="124" width="19" height="18" rx="4"></rect>
            <rect x="81" y="124" width="19" height="18" rx="4"></rect>
            <rect x="106" y="124" width="19" height="18" rx="4"></rect>
            <rect x="131" y="124" width="19" height="18" rx="4"></rect>
            <rect x="156" y="124" width="19" height="18" rx="4"></rect>
            <rect x="181" y="124" width="19" height="18" rx="4"></rect>
            <rect x="206" y="124" width="19" height="18" rx="4"></rect>
            <rect x="231" y="124" width="19" height="18" rx="4"></rect>
            <rect x="44" y="150" width="19" height="18" rx="4"></rect>
            <rect x="69" y="150" width="19" height="18" rx="4"></rect>
            <rect x="94" y="150" width="19" height="18" rx="4"></rect>
            <rect x="119" y="150" width="19" height="18" rx="4"></rect>
            <rect x="144" y="150" width="19" height="18" rx="4"></rect>
            <rect x="169" y="150" width="19" height="18" rx="4"></rect>
            <rect x="194" y="150" width="19" height="18" rx="4"></rect>
            <rect x="219" y="150" width="19" height="18" rx="4"></rect>
            <text x="40.5" y="133">ㅂ</text>
            <text x="65.5" y="133">ㅈ</text>
            <text x="90.5" y="133">ㄷ</text>
            <text x="115.5" y="133">ㄱ</text>
            <text x="140.5" y="133">ㅅ</text>
            <text x="155" y="159">ㅎ</text>
          </g>
        </svg>
        <p>행맨은 오늘의 단어를 한글 자모로 맞히는 게임입니다.</p>
        <p>자모를 선택하면 맞은 글자는 정답 칸에 표시되고, 틀린 선택은 행맨 그림에 반영됩니다.</p>
        <p>막히면 힌트를 사용할 수 있습니다. 추가 힌트를 얻는 방법을 찾아보세요.</p>
      </div>

      <div class="share-card" id="shareCard">
        <div class="share-line title-font" id="sharePuzzle">한글 행맨 #1</div>
        <div class="share-line title-font" id="shareStatus">[ 살았다 ]</div>
        <div class="share-line share-squares" id="shareSquares">■■□□</div>
        <div class="share-line" id="shareAttempts">시도 4</div>
      </div>

      <div class="modal-actions">
        <button class="mini-btn" id="copyBtn" type="button">복사</button>
        <button class="mini-btn" id="shareModalBtn" type="button">공유</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="settingsModal" aria-hidden="true">
    <div class="modal settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <button class="modal-close" id="closeSettingsBtn" type="button" aria-label="닫기">×</button>

      <div class="modal-title title-font" id="settingsTitle">설정</div>

      <div class="settings-panel" id="settingsPanel" aria-label="설정 패널">
        <label class="setting-item">
          <input type="checkbox" id="wrongJamoToggle" />
          <span>틀린 자모 보기</span>
        </label>
        <label class="setting-item">
          <input type="checkbox" id="wordMeaningToggle" />
          <span>단어 뜻 보기</span>
        </label>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
