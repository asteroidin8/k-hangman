<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한글 행맨 공유 이미지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      background: #fafcff;
      color: #111111;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
    }

    .frame {
      width: 1200px;
      height: 630px;
      padding: 54px 64px;
      background:
        linear-gradient(to bottom, transparent 0, transparent 31px, rgba(17, 17, 17, 0.04) 32px),
        #fafcff;
      background-size: 100% 34px;
      display: grid;
      grid-template-columns: 1fr 390px;
      gap: 48px;
      align-items: center;
    }

    .copy {
      display: grid;
      gap: 34px;
    }

    h1 {
      margin: 0;
      font-size: 104px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 800;
    }

    p {
      margin: 0;
      font-size: 44px;
      line-height: 1.28;
      font-weight: 700;
    }

    .slots {
      display: flex;
      gap: 18px;
      margin-top: 10px;
    }

    .slot {
      width: 72px;
      height: 78px;
      border-bottom: 8px solid #111111;
    }

    .paper {
      position: relative;
      width: 390px;
      height: 420px;
      border: 6px solid #111111;
      border-radius: 28px;
      background: #ffffff;
      box-shadow: 0 18px 42px rgba(17, 17, 17, 0.12);
      overflow: hidden;
    }

    .paper::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, transparent 0, transparent 29px, rgba(17, 17, 17, 0.04) 30px);
      background-size: 100% 32px;
    }

    svg {
      position: absolute;
      inset: 46px 34px 30px;
      width: 322px;
      height: 260px;
      overflow: visible;
    }

    .scaffold,
    .part {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .scaffold {
      stroke: #111111;
      stroke-width: 6;
    }

    .part {
      stroke: #cc2f2f;
      stroke-width: 6;
    }

    .tag {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 34px;
      border: 4px solid #111111;
      border-radius: 16px;
      background: #ffffff;
      padding: 14px 18px;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="copy" aria-label="공유 문구">
      <h1>한글 행맨</h1>
      <p>하루 한 단어.<br />자모로 살아남기.</p>
      <div class="slots" aria-hidden="true">
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>
    </section>

    <section class="paper" aria-label="행맨 그림">
      <svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path
          class="scaffold"
          d="M22 234
             Q 95 230 162 234
             M 88 232
             Q 86 170 88 104
             Q 89 66 88 20
             M 87 21
             Q 130 18 170 20
             Q 186 19 201 20
             M 170 20
             Q 188 40 204 58
             M 202 20
             Q 204 54 203 88"
        />
        <g transform="translate(58, 30)">
          <path
            class="part"
            d="M121 77
               C 116 64, 129 55, 142 57
               C 155 58, 161 69, 159 80
               C 156 92, 145 99, 132 96
               C 124 94, 118 87, 121 77 Z"
          />
          <path class="part" d="M138 96 Q 142 116 143 138 Q 143 151 142 166" />
          <path class="part" d="M141 116 Q 123 126 108 138" />
          <path class="part" d="M143 120 Q 156 130 167 145" />
          <path class="part" d="M141 166 Q 127 185 116 205" />
          <path class="part" d="M141 166 Q 151 184 162 204" />
        </g>
      </svg>
      <div class="tag">오늘의 단어</div>
    </section>
  </main>
</body>
</html>
